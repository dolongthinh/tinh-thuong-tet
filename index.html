<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Thưởng Tết - Kyo.D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-red: #b30000;
            --gold: #ffcc00;
            --bg-light: #fff9c4;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--primary-red);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* WATERMARK TOÀN TRANG */
        body::before {
            content: "Kyo.D";
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 15vw;
            color: rgba(255, 255, 255, 0.05);
            z-index: -1;
            pointer-events: none;
        }

        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        .card {
            background-color: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            flex: 1;
            min-width: 320px;
            border: 2px solid var(--gold);
            position: relative;
        }

        /* WATERMARK TRONG PHIẾU */
        .watermark-inner {
            position: absolute;
            top: 40%; left: 10%;
            transform: rotate(-30deg);
            font-size: 80px;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.04);
            pointer-events: none;
            z-index: 0;
        }

        h2 {
            text-align: center;
            color: var(--primary-red);
            text-transform: uppercase;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input.money-input { text-align: right; font-weight: bold; color: #d60000; }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-calc {
            background-color: var(--primary-red);
            color: var(--gold);
        }

        .btn-download {
            background-color: #28a745;
            color: white;
            display: none; /* Hiện sau khi tính */
        }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* BẢNG CHI TIẾT */
        #capture-area {
            background-color: var(--bg-light);
            padding: 20px;
            border-radius: 10px;
            position: relative;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            position: relative;
            z-index: 1;
        }

        .detail-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .row-value { text-align: right; font-weight: bold; }
        
        .total-row {
            background-color: var(--primary-red);
            color: white;
            font-size: 1.2em;
        }

        .result-container {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .copyright {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="card">
        <h2>Nhập Thông Tin</h2>
        <div class="form-group">
            <label>Lương cơ bản:</label>
            <input type="text" id="luongCB" class="money-input" oninput="formatTien(this)" placeholder="0">
        </div>
        <div class="form-group">
            <label>Tăng lương nhà nước:</label>
            <input type="text" id="tangNN" class="money-input" oninput="formatTien(this)" placeholder="0">
        </div>
        <div class="form-group">
            <label>Tăng lương công ty (%):</label>
            <input type="number" id="tangCty" placeholder="0">
        </div>
        <div class="form-group">
            <label>PCHTSX:</label>
            <input type="text" id="pchtsx" class="money-input" oninput="formatTien(this)" placeholder="0">
        </div>
        <div class="form-group">
            <label>Tỷ lệ thưởng:</label>
            <select id="tyLe">
                <option value="0.5">50%</option>
                <option value="0.75">75%</option>
                <option value="1.0">100%</option>
                <option value="1.25">125%</option>
                <option value="1.5" selected>150%</option>
            </select>
        </div>
        <button class="btn btn-calc" onclick="tinhThuong()">TÍNH THƯỞNG</button>
    </div>

    <div class="card result-container" id="resultCard">
        <div id="capture-area">
            <div class="watermark-inner">Kyo.D</div>
            <h2>Phiếu Thưởng Tết</h2>
            <table class="detail-table">
                <tr><td>Lương CB:</td><td class="row-value" id="res-cb">0</td></tr>
                <tr><td>Tăng lương NN:</td><td class="row-value" id="res-nn">0</td></tr>
                <tr><td>Tăng lương CTY:</td><td class="row-value" id="res-cty">0</td></tr>
                <tr><td>PCHTSX:</td><td class="row-value" id="res-pc">0</td></tr>
                <tr><td>Cơ sở tính:</td><td class="row-value" id="res-base">0</td></tr>
                <tr><td>Tỷ lệ:</td><td class="row-value" id="res-rate">100%</td></tr>
                <tr class="total-row">
                    <td>THỰC NHẬN:</td>
                    <td class="row-value" id="res-total">0</td>
                </tr>
            </table>
            <div class="copyright">Phần mềm cung cấp bởi Kyo.D</div>
        </div>
        
        <button class="btn btn-download" id="btnDownload" onclick="chupAnh()">📸 TẢI ẢNH PHIẾU THƯỞNG</button>
    </div>
</div>

<script>
    function formatTien(input) {
        let v = input.value.replace(/\D/g, "");
        input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function getNum(id) {
        return parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
    }

    function formatVND(n) {
        return n.toLocaleString('vi-VN', { style: 'currency', currency: 'VND' });
    }

    function tinhThuong() {
        const cb = getNum('luongCB');
        const nn = getNum('tangNN');
        const ctyP = parseFloat(document.getElementById('tangCty').value) || 0;
        const pc = getNum('pchtsx');
        const rate = parseFloat(document.getElementById('tyLe').value);

        const sauNN = cb + nn;
        const tienCty = (ctyP / 100) * sauNN;
        const base = sauNN + tienCty + pc;
        const total = base * rate;

        document.getElementById('res-cb').innerText = formatVND(cb);
        document.getElementById('res-nn').innerText = formatVND(nn);
        document.getElementById('res-cty').innerText = formatVND(tienCty);
        document.getElementById('res-pc').innerText = formatVND(pc);
        document.getElementById('res-base').innerText = formatVND(base);
        document.getElementById('res-rate').innerText = (rate * 100) + "%";
        document.getElementById('res-total').innerText = formatVND(total);

        document.getElementById('resultCard').style.display = 'flex';
        document.getElementById('btnDownload').style.display = 'block';
    }

    function chupAnh() {
        const area = document.getElementById('capture-area');
        const btn = document.getElementById('btnDownload');
        
        // Đổi tên nút tạm thời để thông báo
        btn.innerText = "Đang tạo ảnh...";
        
        html2canvas(area, {
            backgroundColor: "#fff9c4",
            scale: 2, // Tăng chất lượng ảnh lên 2 lần
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Phieu-Thuong-Tet-KyoD.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerText = "📸 TẢI ẢNH PHIẾU THƯỞNG";
        });
    }
</script>
</body>
</html>
